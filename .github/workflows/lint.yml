---
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-lint yamllint

      - name: Create minimal inventory
        run: cp inventory/hosts.example inventory/hosts.yml

      - name: Run yamllint
        run: yamllint playbooks/ roles/ inventory/group_vars/

      - name: Run ansible-lint
        run: ansible-lint
