---
- name: Ensure containerd root directory on NVMe exists
  ansible.builtin.file:
    path: "{{ containerd_root }}"
    state: directory
    owner: root
    group: root
    mode: "0711"

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy containerd config with NVMe root
  ansible.builtin.template:
    src: containerd_config.toml.j2
    dest: /etc/containerd/config.toml
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: containerd_config_copied

- name: Restart containerd to apply new root configuration
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    daemon_reload: true
  when: containerd_config_copied.changed
  register: containerd_restarted
