---
- name: Allow ports from {{ host }}
  ansible.builtin.shell: |
    sudo iptables -P INPUT ACCEPT
    sudo iptables -F INPUT
    sudo iptables -A INPUT -i lo -j ACCEPT
    sudo iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
    sudo iptables -A INPUT -p tcp --dport 22 -j ACCEPT
    sudo iptables -A INPUT -p tcp -m multiport --dports 8000,8080,5050,5000 -s {{ host }} -j ACCEPT
    sudo iptables -P INPUT DROP

    sudo iptables -F DOCKER-USER
    sudo iptables -A DOCKER-USER -p tcp --dport 22 -j ACCEPT
    sudo iptables -A DOCKER-USER -p tcp -m multiport --dports 8000,8080,5050,5000 -s {{ host }} -j ACCEPT
    sudo iptables -A DOCKER-USER -p tcp -m multiport --dports 8000,8080,5050,5000 ! -s {{ host }} -j DROP
  args:
    executable: /bin/bash
