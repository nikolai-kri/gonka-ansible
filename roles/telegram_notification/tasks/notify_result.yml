---
- name: Display Telegram send result
  ansible.builtin.debug:
    msg: "Telegram message sent successfully"
  when:
    - telegram_result is defined
    - telegram_result.status == 200

- name: Display Telegram error
  ansible.builtin.debug:
    msg: "Failed to send Telegram message. Check bot_token and chat_id in group_vars/all: {{ telegram_result }}"
  when:
    - telegram_result is defined
    - telegram_result.status | default(0) | int != 200

- name: Display Telegram configuration missing
  ansible.builtin.debug:
    msg: "Telegram bot_token or chat_id not configured. Please set them in inventory/group_vars/all"
  when:
    - telegram_bot_token is not defined or telegram_bot_token | default('') | length == 0
    - or telegram_chat_id is not defined or telegram_chat_id | default('') | length == 0
